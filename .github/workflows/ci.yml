name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore src/Sway.sln

    - name: Build
      run: dotnet build src/Sway.sln --configuration Debug --no-restore

    - name: Test
      run: dotnet test src/Sway.sln --configuration Debug --no-build --verbosity normal
